<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rider lab</title>
<meta name="robots" content="noindex, nofollow">
<style>
  html, body { margin:0; height:100%; background:#0a0e1c; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
  .hud { position:fixed; top:10px; left:10px; z-index:9; font:11px/1.6 monospace;
    color:#c9a24b; letter-spacing:.1em; background:rgba(4,6,14,.9);
    border:1px solid rgba(201,162,75,.4); padding:8px 10px; }
</style></head>
<body>
<div class="hud">RIDER LAB &nbsp; scale <input id="k" type="range" min="4" max="26" step="1" value="16">
  <span id="kv">16</span> &nbsp; <a href="skyline-lab.html" style="color:#e11d48">skyline →</a></div>
<canvas id="c"></canvas>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   THE DETROIT SKYLINE, from Belle Isle looking west across the river.

   Single source of truth: injected into both the Storm City demo and the
   skyline lab page (skyline-lab.html), which renders it big and clean with no
   rain, clouds or card on top so the silhouettes can actually be judged.

   Everything is drawn as SILHOUETTE + LIT WINDOWS. At night, from a mile away
   across water, that is all a building is: a black shape with a rim where the
   light catches it, and its windows. Get the shape right and it reads; get it
   wrong and no amount of detail saves it.

   Coordinates: origin top-left. `HZ` is the waterline. Buildings are laid out in
   a fixed virtual width and then scaled, so on a phone the city overflows the
   right edge rather than being crushed to fit.
   ═══════════════════════════════════════════════════════════════════════════ */
function drawSkyline(s, W, H, HZ, ZOOM) {

  // ── LAYOUT SPACE. The city is laid out in a fixed virtual width (VW) and
  //    then scaled. On a wide screen the scale is just W/VW, so the whole
  //    skyline spans the viewport. On a NARROW screen we refuse to shrink it
  //    any further — we take the height-derived scale instead and simply let
  //    the city run off the right edge. The RenCen stays anchored on the left
  //    at a proper size and you see a few buildings marching right, rather
  //    than the entire skyline crushed into 400px of phone.
  const VW = 1150;
  const S = Math.max(W / VW, Math.min(1.15, H / 780)) * (ZOOM || 1);
  const CITY_W = VW * S;

  // When the city is wider than the viewport (any phone), pan it so the RenCen
  // sits near the LEFT edge at full size and the rest of downtown marches off
  // to the right. Fitting the whole skyline into 400px is what made it look
  // cramped; showing a proper RenCen and a few neighbours does not.
  //
  // The framing is keyed on the RENCEN, deliberately. It was briefly shifted
  // right to keep Michigan Central (which sits west of it) on screen, but that
  // moved every other building with it — the station is a guest here, it does
  // not get to reframe the skyline. On a narrow screen it simply runs off the
  // left edge, the same as the rest of the city runs off the right.
  const OX = CITY_W > W ? (W * 0.20 - 0.22 * CITY_W) : 0;
  const X = (f) => f * CITY_W + OX;   // design fraction -> screen x

  const GOLD = '201,162,75';
  const GOLD_HI = '232,199,106';
  const CRIMSON = '225,29,72';

  const BODY = '#080b16';        // standard tower body
  const BODY_NEAR = '#04060c';   // nearer = darker (it blocks more of the glow)
  const BODY_FAR = '#0b0f1e';    // further = lighter (haze washes it out)

  // ── Storm glow behind the city. Black towers on a black page are invisible;
  //    this is the lit sky they stand against.
  const glow = s.createRadialGradient(X(0.30), HZ, 10, X(0.30), HZ, Math.max(W, H) * 0.7);
  glow.addColorStop(0, 'rgba(' + GOLD + ',0.18)');
  glow.addColorStop(0.35, 'rgba(185,28,44,0.11)');
  glow.addColorStop(1, 'rgba(185,28,44,0)');
  s.fillStyle = glow;
  s.fillRect(0, 0, W, HZ + 2);

  // ── Lit windows. They CLUSTER: offices light up by the floor, not at random.
  function win(x, y, w, h, density) {
    for (let wy = y + 4; wy < y + h - 2; wy += 6) {
      const floorLit = Math.random() < 0.35;                 // is this floor busy?
      for (let wx = x + 2; wx < x + w - 2; wx += 5) {
        if (Math.random() > (floorLit ? density * 1.9 : density * 0.55)) continue;
        s.fillStyle = Math.random() < 0.08
          ? 'rgba(' + CRIMSON + ',' + (0.3 + Math.random() * 0.5) + ')'
          : 'rgba(' + GOLD_HI + ',' + (0.25 + Math.random() * 0.55) + ')';
        s.fillRect(wx, wy, 2, 3);
      }
    }
  }

  // Rim light down the lit edge + along the top. This is what separates one
  // black shape from the black shape behind it.
  function rim(x, y, w, h, a) {
    s.fillStyle = 'rgba(' + GOLD + ',' + (a || 0.16) + ')';
    s.fillRect(x, y, 1, h);
    s.fillRect(x, y, w, 1);
  }

  // ── Primitive: a flat-topped box.
  function box(x, w, h, density, body, rimA) {
    const y = HZ - h;
    s.fillStyle = body || BODY;
    s.fillRect(x, y, w, h);
    rim(x, y, w, h, rimA);
    win(x, y, w, h, density === undefined ? 0.18 : density);
    return y;
  }

  // ── Primitive: a cylinder (rounded shoulders + vertical mullions).
  //    The RenCen towers are ribbed glass tubes; the ribs are what say "glass".
  function cyl(x, w, h, density, body, edgeA) {
    const y = HZ - h, r = Math.min(7, w * 0.28);
    s.save();
    s.beginPath();
    s.moveTo(x, HZ);
    s.lineTo(x, y + r);
    s.quadraticCurveTo(x, y, x + r, y);
    s.lineTo(x + w - r, y);
    s.quadraticCurveTo(x + w, y, x + w, y + r);
    s.lineTo(x + w, HZ);
    s.closePath();
    s.clip();

    // CROSS-SHADING is what makes a tube read as a tube instead of a flat box.
    // A cylinder is darkest where it turns away from us at the edges and
    // lightest down the middle where it faces us. Without this the RenCen is
    // just five rectangles, which is exactly what it looked like.
    const shade = s.createLinearGradient(x, 0, x + w, 0);
    const base = body || BODY;
    shade.addColorStop(0, '#03040a');
    shade.addColorStop(0.22, base);
    shade.addColorStop(0.5, '#131a30');
    shade.addColorStop(0.78, base);
    shade.addColorStop(1, '#03040a');
    s.fillStyle = shade;
    s.fillRect(x, y, w, h);

    // A glass tube also catches a vertical highlight just off centre.
    const hl = s.createLinearGradient(x, 0, x + w, 0);
    hl.addColorStop(0, 'rgba(' + GOLD + ',0)');
    hl.addColorStop(0.42, 'rgba(' + GOLD + ',0.10)');
    hl.addColorStop(0.52, 'rgba(' + GOLD + ',0)');
    s.fillStyle = hl;
    s.fillRect(x, y, w, h);

    // Vertical mullions, tighter toward the edges: the ribs wrap around the
    // curve, so they bunch up where the surface turns away.
    s.strokeStyle = 'rgba(' + GOLD + ',0.07)';
    s.lineWidth = 1;
    for (let i = 1; i < 12; i++) {
      const f = i / 12;
      const mx = x + w * (0.5 - Math.cos(f * Math.PI) * 0.5);   // cosine spacing
      s.beginPath(); s.moveTo(mx, y + r); s.lineTo(mx, HZ); s.stroke();
    }
    win(x, y + r, w, h - r, density);
    s.restore();

    // Outline last, over the shading: this is what stops overlapping black
    // cylinders from merging into a single blob.
    s.beginPath();
    s.moveTo(x, HZ);
    s.lineTo(x, y + r);
    s.quadraticCurveTo(x, y, x + r, y);
    s.lineTo(x + w - r, y);
    s.quadraticCurveTo(x + w, y, x + w, y + r);
    s.lineTo(x + w, HZ);
    s.strokeStyle = 'rgba(' + GOLD + ',' + (edgeA || 0.26) + ')';
    s.lineWidth = 1;
    s.stroke();
    return y;
  }

  // ═══════════════════════════════════════════════════════════════
  //  THE RENAISSANCE CENTER
  //
  //  Plan: a 73-storey hotel cylinder at the centre of a SQUARE, with four
  //  identical 39-storey office cylinders at the square's corners.
  //
  //  We view that square CORNER-ON from Belle Isle, so it projects to a
  //  diamond and the four identical towers land at four different depths:
  //
  //              back   (furthest: mostly swallowed by the hotel)
  //        left  o           o  right
  //              front  (nearest: stands in FRONT of the hotel)
  //
  //  Perspective therefore makes identical buildings render at different
  //  heights: near = tallest on screen, back = shortest. The front tower is
  //  offset LEFT of the hotel's centreline, so the hotel's shaft stays exposed
  //  down its right side. Painted back -> left -> right -> front so the
  //  overlaps actually occlude.
  //
  //  The whole cluster sits on a wide 5-storey podium at the waterline, which
  //  is what plants it on the river in every photograph.
  // ═══════════════════════════════════════════════════════════════
  const RC = X(0.22);              // cluster centre
  const HW = 44 * S;                // hotel: a fat glass tube, not a pole
  const HH = 248 * S;
  const hx = RC - HW / 2;

  const T_BACK  = { body: BODY_FAR,  edge: 0.14, win: 0.14 };
  const T_SIDE  = { body: '#06080f', edge: 0.24, win: 0.22 };
  const T_FRONT = { body: BODY_NEAR, edge: 0.34, win: 0.26 };

  const BACK  = { x: hx + 0.40 * HW, w: HW * 0.74, h: HH * 0.62, t: T_BACK };
  const LEFT  = { x: hx - 0.92 * HW, w: HW * 0.86, h: HH * 0.74, t: T_SIDE };
  const RIGHT = { x: hx + 1.12 * HW, w: HW * 0.90, h: HH * 0.76, t: T_SIDE };
  const FRONT = { x: hx - 0.14 * HW, w: HW * 0.98, h: HH * 0.80, t: T_FRONT };

  // An office tower: cylinder + the flat mechanical crown box on top.
  function officeTower(T) {
    const y = cyl(T.x, T.w, T.h, T.t.win, T.t.body, T.t.edge);
    // Dark mechanical collar just under the top, then the crown box: the
    // office towers are capped, not open-topped.
    s.fillStyle = '#04060c';
    s.fillRect(T.x + 1, y + 3 * S, T.w - 2, 3 * S);
    s.fillStyle = T.t.body;
    s.fillRect(T.x + T.w * 0.18, y - 4 * S, T.w * 0.64, 4 * S);
    s.strokeStyle = 'rgba(' + GOLD + ',' + T.t.edge + ')';
    s.lineWidth = 1;
    s.strokeRect(T.x + T.w * 0.18, y - 4 * S, T.w * 0.64, 4 * S);
  }

  officeTower(BACK);

  // The hotel.
  (function hotel() {
    const y = cyl(hx, HW, HH, 0.24, BODY, 0.28);
    // Crown: the wide restaurant band, then the narrower drum, then the mast.
    s.fillStyle = BODY;
    s.fillRect(hx + HW * 0.06, y - 8 * S, HW * 0.88, 8 * S);
    s.strokeStyle = 'rgba(' + GOLD + ',0.32)';
    s.lineWidth = 1;
    s.strokeRect(hx + HW * 0.06, y - 8 * S, HW * 0.88, 8 * S);
    // The lit ring: the RenCen's crown glows at night, and it is the single
    // most recognisable detail on the whole building.
    s.fillStyle = 'rgba(' + GOLD_HI + ',0.5)';
    s.fillRect(hx + HW * 0.06, y - 6 * S, HW * 0.88, 1.5);
    s.fillStyle = BODY;
    s.fillRect(hx + HW * 0.26, y - 14 * S, HW * 0.48, 6 * S);
    s.strokeRect(hx + HW * 0.26, y - 14 * S, HW * 0.48, 6 * S);
    s.fillRect(hx + HW * 0.5 - 1, y - 30 * S, 2, 16 * S);          // mast
    s.fillStyle = 'rgba(' + CRIMSON + ',0.9)';
    s.fillRect(hx + HW * 0.5 - 2.5, y - 33 * S, 5, 4);             // beacon
  })();

  officeTower(LEFT);
  officeTower(RIGHT);
  officeTower(FRONT);

  // The podium the cluster stands on, and the low riverfront buildings in
  // front of it. Without this the towers look like they float on the water.
  const podL = LEFT.x - 26 * S, podR = RIGHT.x + RIGHT.w + 22 * S;
  s.fillStyle = '#0a0e1c';
  s.fillRect(podL, HZ - 26 * S, podR - podL, 26 * S);
  rim(podL, HZ - 26 * S, podR - podL, 26 * S, 0.12);
  win(podL, HZ - 26 * S, podR - podL, 26 * S, 0.12);

  /* ── MICHIGAN CENTRAL STATION, standing where the two anonymous boxes were.
       It does not belong on the river, but it is the most photographed building
       in Detroit and its shape is unmistakable, so it earns the spot.

       SCALE, first, because this was badly wrong before: the station is ~230 ft.
       The RenCen hotel is ~727 ft. So the tower must come to roughly a THIRD of
       the hotel, not two thirds. It is a wide, squat, heavy building — its
       presence comes from mass and detail, never from height.

       SHAPE, read off the reference photo (mirrored: the tower reads on the
       right, the concourse running away to the left):

         - a broad 18-storey office block, far wider than it is tall
         - a PROJECTING END BAY at each end of the block, stepping forward of
           the main wall and carrying its own cornice. That pair of end pavilions
           either side of the recessed centre is the building's real signature.
         - a huge overhanging CORNICE crowning the whole thing, with a plain
           attic storey beneath it
         - we stand east of it, so a narrow return face is visible, foreshortened
         - at the base, the low CONCOURSE: a colonnaded front with a great
           arched central entrance under a pediment, and a long arcaded wing
           running away west, its arches shrinking as they recede
  */
  (function michiganCentral() {
    const TW = 58 * S;                 // block: wide
    const TH = 78 * S;                 // block: SHORT — about a third of the hotel
    const TD = 10 * S;                 // east return face, foreshortened
    const tx = podL - 84 * S;
    const ty = HZ - TH;

    const FRONT = '#080b16';
    const SIDE = '#04060d';            // the return face is turned away: darker
    const HALL = '#0a0e1c';

    const hallH = 26 * S;              // the concourse: a third of the block again
    const wingW = 70 * S;              // arcaded wing running away to the west
    const wx = tx - wingW;

    // ── The arcaded wing, running away from us. Roofline steps DOWN as it
    //    recedes and the arches crowd together: that convergence is the
    //    perspective, and it is cheap.
    s.fillStyle = HALL;
    s.beginPath();
    s.moveTo(wx, HZ);
    s.lineTo(wx, HZ - hallH * 0.72);           // far end: lower
    s.lineTo(tx, HZ - hallH);                  // near end: full height
    s.lineTo(tx, HZ);
    s.closePath();
    s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.28)';
    s.lineWidth = 1.4;
    s.beginPath();                              // wing cornice, on the same rake
    s.moveTo(wx, HZ - hallH * 0.72);
    s.lineTo(tx, HZ - hallH);
    s.stroke();
    for (let i = 0; i < 8; i++) {
      const f = i / 8;
      const ax = wx + 4 * S + f * (wingW - 8 * S);
      const sc = 0.72 + f * 0.28;              // nearer = taller
      const aw = 5.2 * S * sc, ah = 13 * S * sc;
      const abase = HZ - 4 * S, atop = abase - ah;
      s.fillStyle = 'rgba(' + GOLD_HI + ',' + (0.16 + Math.random() * 0.3) + ')';
      s.beginPath();
      s.moveTo(ax, abase);
      s.lineTo(ax, atop + aw / 2);
      s.arc(ax + aw / 2, atop + aw / 2, aw / 2, Math.PI, 0);
      s.lineTo(ax + aw, abase);
      s.closePath();
      s.fill();
    }

    // ── The block's east return face (drawn first: it sits behind the front).
    s.fillStyle = SIDE;
    s.beginPath();
    s.moveTo(tx + TW, HZ);
    s.lineTo(tx + TW, ty);
    s.lineTo(tx + TW + TD, ty + 6 * S);        // top edge rakes down as it recedes
    s.lineTo(tx + TW + TD, HZ);
    s.closePath();
    s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.13)';
    s.lineWidth = 1;
    s.stroke();
    for (let wy = ty + 12 * S; wy < HZ - hallH; wy += 6 * S) {
      for (let wx2 = tx + TW + 2 * S; wx2 < tx + TW + TD - 1.5 * S; wx2 += 3.5 * S) {
        if (Math.random() > 0.35) continue;
        s.fillStyle = 'rgba(' + GOLD_HI + ',' + (0.1 + Math.random() * 0.26) + ')';
        s.fillRect(wx2, wy, 1.5, 2.5);
      }
    }

    // ── The main wall (recessed centre).
    const bayW = 13 * S;                        // the projecting end pavilions
    s.fillStyle = FRONT;
    s.fillRect(tx, ty + 4 * S, TW, TH - 4 * S);
    win(tx + bayW, ty + 10 * S, TW - bayW * 2, TH - hallH - 12 * S, 0.42);
    s.fillStyle = 'rgba(' + GOLD + ',0.10)';    // faint pilaster shadows
    for (let i = 1; i < 8; i++) {
      s.fillRect(tx + bayW + i * (TW - bayW * 2) / 8, ty + 8 * S, 1, TH - hallH - 10 * S);
    }

    // ── The END PAVILIONS: they step FORWARD of the centre wall, run the full
    //    height, and each carries its own cornice. This pair either side of the
    //    recessed middle is the thing that makes the building recognisable.
    const pavilion = (px) => {
      s.fillStyle = '#05070f';                  // forward of the wall: darker
      s.fillRect(px, ty, bayW, TH);
      rim(px, ty, bayW, TH, 0.26);
      win(px + 1.5 * S, ty + 8 * S, bayW - 3 * S, TH - hallH - 10 * S, 0.4);
      s.fillStyle = '#05070f';                  // its own cornice, overhanging
      s.fillRect(px - 2 * S, ty - 5 * S, bayW + 4 * S, 5 * S);
      rim(px - 2 * S, ty - 5 * S, bayW + 4 * S, 5 * S, 0.34);
    };
    pavilion(tx);
    pavilion(tx + TW - bayW);

    // ── The great CORNICE over the centre, and the plain attic under it.
    const co = 3 * S, ch = 6 * S;
    s.fillStyle = FRONT;
    s.fillRect(tx + bayW - co, ty + 3 * S, TW - bayW * 2 + co * 2, ch);
    rim(tx + bayW - co, ty + 3 * S, TW - bayW * 2 + co * 2, ch, 0.3);
    s.fillStyle = 'rgba(' + GOLD_HI + ',0.26)';  // lit restored floors
    s.fillRect(tx + bayW + 1 * S, ty + 11 * S, TW - bayW * 2 - 2 * S, 2.5 * S);

    // ── The CONCOURSE at the base: colonnade, and the great arched entrance
    //    under its pediment.
    s.fillStyle = HALL;
    s.fillRect(tx - 4 * S, HZ - hallH, TW + 8 * S, hallH);
    rim(tx - 4 * S, HZ - hallH, TW + 8 * S, hallH, 0.22);
    for (let i = 0; i < 7; i++) {                // colonnade
      const cx0 = tx + 2 * S + i * (TW - 4 * S) / 7;
      s.fillStyle = 'rgba(' + GOLD_HI + ',' + (0.12 + Math.random() * 0.22) + ')';
      s.fillRect(cx0, HZ - hallH + 5 * S, 2.2 * S, hallH - 8 * S);
    }
    const ex = tx + TW * 0.42, ew = 14 * S;      // the arched entrance
    s.fillStyle = 'rgba(' + GOLD_HI + ',0.4)';
    s.beginPath();
    s.moveTo(ex, HZ);
    s.lineTo(ex, HZ - hallH + 10 * S);
    s.arc(ex + ew / 2, HZ - hallH + 10 * S, ew / 2, Math.PI, 0);
    s.lineTo(ex + ew, HZ);
    s.closePath();
    s.fill();
    s.fillStyle = HALL;                          // pediment over the entrance
    s.beginPath();
    s.moveTo(ex - 4 * S, HZ - hallH);
    s.lineTo(ex + ew / 2, HZ - hallH - 7 * S);
    s.lineTo(ex + ew + 4 * S, HZ - hallH);
    s.closePath();
    s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.3)';
    s.lineWidth = 1;
    s.stroke();
  })();

  // A low riverfront block filling the clear space just east of the RenCen —
  // and the roof he parks on. Without it he stands on thin air.
  const roofH = 26 * S;
  box(podR + 4 * S, 74 * S, roofH, 0.14, '#0a0e1c');


  /* ═══════════════════════════════════════════════════════════════════════
     THE LANDMARKS.

     Detroit's skyline is an art deco skyline. Deco means SETBACKS — the tower
     steps inward as it rises — and it means a CROWN, not a flat roof. That
     stepped, crowned silhouette is the entire difference between "Detroit" and
     "generic city", so each landmark is built from its own real profile rather
     than from a rectangle with a hat on it.
     ═══════════════════════════════════════════════════════════════════════ */

  // ── Helper: a tower that steps inward as it rises. `steps` is a list of
  //    [heightFraction, widthFraction] from the ground up.
  function stepped(x, w, h, steps, body, density) {
    let cx = x, cw = w, top = HZ;
    const parts = [];
    for (const st of steps) {
      const sh = h * st[0], sw = w * st[1];
      cx = x + (w - sw) / 2;                    // stay centred as it narrows
      const y = top - sh;
      s.fillStyle = body || BODY;
      s.fillRect(cx, y, sw, sh);
      rim(cx, y, sw, sh, 0.15);
      win(cx, y, sw, sh, density === undefined ? 0.2 : density);
      parts.push({ x: cx, y, w: sw, h: sh });
      top = y;
      cw = sw;
    }
    return { top, x: cx, w: cw, parts };
  }

  // ── PENOBSCOT. 1928 art deco. Big square base, then a tall shaft, then a
  //    tight stack of setbacks, capped by the mast and its red beacon — the
  //    beacon is the tell, it has been burning over Detroit for a century.
  (function penobscot() {
    const x = X(0.355), w = 40 * S, h = 190 * S;
    const t = stepped(x, w, h, [[0.52, 1.0], [0.24, 0.66], [0.12, 0.42], [0.07, 0.26]], BODY, 0.2);
    s.fillStyle = BODY;
    s.fillRect(t.x + t.w * 0.5 - 1, t.top - 18 * S, 2, 18 * S);     // mast
    s.fillStyle = 'rgba(' + CRIMSON + ',0.95)';                      // THE beacon
    s.beginPath(); s.arc(t.x + t.w * 0.5, t.top - 20 * S, 3, 0, 7); s.fill();
    s.fillStyle = 'rgba(' + CRIMSON + ',0.25)';
    s.beginPath(); s.arc(t.x + t.w * 0.5, t.top - 20 * S, 7, 0, 7); s.fill();
  })();

  // ── GUARDIAN. 1929. Deco again, but its top is a stepped PYRAMID of gables
  //    rather than a mast: the profile tapers to a blunt point.
  (function guardian() {
    const x = X(0.318), w = 30 * S, h = 152 * S;
    const t = stepped(x, w, h, [[0.62, 1.0], [0.2, 0.7], [0.1, 0.44]], BODY, 0.18);
    s.fillStyle = BODY;                                              // gabled cap
    s.beginPath();
    s.moveTo(t.x, t.top);
    s.lineTo(t.x + t.w / 2, t.top - 14 * S);
    s.lineTo(t.x + t.w, t.top);
    s.closePath(); s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.18)';
    s.lineWidth = 1; s.stroke();
  })();

  // ── ALLY / ONE DETROIT CENTER. 1993, postmodern-gothic: the tallest office
  //    tower, and its crown is a CLUSTER OF SPIRES — a central peak flanked by
  //    smaller ones, like a cathedral. That crown is its whole identity.
  (function ally() {
    const x = X(0.418), w = 46 * S, h = 190 * S;
    // Shaft, then TWO setbacks, then the crown. The crown is a single mass that
    // rises to one central peak with buttress spires tucked against it — not a
    // row of equal triangles, which reads as a comb.
    const t = stepped(x, w, h, [[0.72, 1.0], [0.16, 0.78], [0.12, 0.56]], BODY, 0.2);
    const cx0 = t.x, cw = t.w, y = t.top;
    s.fillStyle = BODY;
    s.beginPath();
    s.moveTo(cx0, y);
    s.lineTo(cx0, y - 10 * S);
    s.lineTo(cx0 + cw * 0.18, y - 22 * S);      // shoulder
    s.lineTo(cx0 + cw * 0.36, y - 16 * S);      // notch
    s.lineTo(cx0 + cw * 0.5, y - 52 * S);       // THE peak
    s.lineTo(cx0 + cw * 0.64, y - 16 * S);
    s.lineTo(cx0 + cw * 0.82, y - 22 * S);
    s.lineTo(cx0 + cw, y - 10 * S);
    s.lineTo(cx0 + cw, y);
    s.closePath();
    s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.22)';
    s.lineWidth = 1; s.stroke();
    // Lit crown: Ally's peak is floodlit at night, and that glow is how you
    // pick it out of the skyline from a mile away.
    s.fillStyle = 'rgba(' + GOLD_HI + ',0.35)';
    s.fillRect(cx0 + cw * 0.46, y - 50 * S, 2, 34 * S);
  })();

  // ── HUDSON'S. 2025, the new one: a slim glass shaft, taller than everything
  //    around it, topped by a needle. Modern, so no setbacks — the contrast
  //    with the deco towers beside it is the point.
  (function hudsons() {
    const x = X(0.487), w = 20 * S, h = 232 * S;
    const y = box(x, w, h, 0.14, '#0a0f1e');
    s.fillStyle = BODY;
    s.fillRect(x + w * 0.5 - 1, y - 40 * S, 2, 40 * S);              // needle
    s.fillStyle = 'rgba(' + GOLD_HI + ',0.8)';
    s.fillRect(x + w * 0.5 - 1.5, y - 42 * S, 3, 3);
  })();

  // ── DAVID STOTT. 1929. Very slim deco: a narrow shaft with a stack of tight
  //    setbacks. Reads as a thin, elegant wedge.
  (function stott() {
    const x = X(0.545), w = 22 * S, h = 165 * S;
    stepped(x, w, h, [[0.58, 1.0], [0.22, 0.72], [0.12, 0.5], [0.08, 0.3]], BODY, 0.18);
  })();

  // ── BOOK TOWER. 1926. The eccentric one: an ornate shaft capped by a steep
  //    green mansard ROOF, not a spire. That dome-ish cap is unmistakable.
  (function book() {
    const x = X(0.585), w = 26 * S, h = 148 * S;
    const y = box(x, w, h, 0.18, BODY);
    s.fillStyle = BODY;                                              // mansard cap
    s.beginPath();
    s.moveTo(x - 2, y);
    s.lineTo(x + w * 0.22, y - 16 * S);
    s.lineTo(x + w * 0.78, y - 16 * S);
    s.lineTo(x + w + 2, y);
    s.closePath(); s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',0.22)';
    s.lineWidth = 1; s.stroke();
    s.fillStyle = BODY;                                              // cupola
    s.fillRect(x + w * 0.42, y - 24 * S, w * 0.16, 8 * S);
  })();

  // ── CADILLAC TOWER. 1927. Slim deco, blunt stepped top.
  (function cadillac() {
    const x = X(0.625), w = 24 * S, h = 140 * S;
    stepped(x, w, h, [[0.66, 1.0], [0.2, 0.66], [0.14, 0.4]], BODY, 0.18);
  })();

  // ── RIVERFRONT TOWERS. Three pale residential towers WEST of the RenCen,
  //    right on the water. Round-shouldered and identical — a rhythm, not a
  //    landmark, but the eye misses them when they are gone.
  for (let i = 0; i < 3; i++) {
    cyl(podL - (200 + i * 28) * S, 18 * S, (112 + i * 8) * S, 0.24, '#0b1020', 0.2);
  }

  // ── Depth ranks. Landmarks alone sit in a line; a city has buildings BEHIND
  //    and IN FRONT of its landmarks. The back rank is lighter (haze) and the
  //    front rank is darker (it blocks the glow), and both overlap their
  //    neighbours, which is what turns a row into a district.
  const backRank = [
    [0.30, 26, 118], [0.345, 22, 96], [0.395, 30, 132], [0.44, 24, 104],
    [0.475, 28, 122], [0.515, 22, 88], [0.56, 26, 110], [0.60, 30, 126],
    [0.645, 24, 98], [0.68, 28, 116], [0.72, 22, 90],
  ];
  for (const b of backRank) box(X(b[0]) - 6 * S, b[1] * S, b[2] * S, 0.12, BODY_FAR, 0.08);

  const frontRank = [
    [0.315, 30, 74], [0.36, 26, 62], [0.40, 34, 86], [0.45, 24, 58],
    [0.49, 30, 70], [0.535, 26, 64], [0.575, 32, 80], [0.62, 24, 56],
    [0.66, 30, 72], [0.70, 26, 60], [0.74, 28, 68],
  ];
  for (const b of frontRank) box(X(b[0]), b[1] * S, b[2] * S, 0.22, BODY_NEAR, 0.2);

  // ── HUNTINGTON PLACE. The long low convention hall on the waterfront: wide
  //    and flat, it anchors the shoreline west of the cluster.
  (function hall() {
    const x = podL - 200 * S, w = 105 * S, h = 30 * S;
    const y = HZ - h;
    s.fillStyle = '#090d1a';
    s.fillRect(x, y, w, h);
    rim(x, y, w, h, 0.13);
    win(x, y, w, h, 0.14);
  })();

  // ── Shoreline: a thin strip of ground at the waterline, its wet edge faded
  //    at both ends. A flat full-width line reads as a rule drawn across the
  //    page rather than a shore.
  s.fillStyle = '#05070e';
  s.fillRect(0, HZ - 2 * S, W, 3 * S);
  const shore = s.createLinearGradient(0, 0, W, 0);
  shore.addColorStop(0, 'rgba(' + GOLD + ',0)');
  shore.addColorStop(0.2, 'rgba(' + GOLD + ',0.10)');
  shore.addColorStop(0.5, 'rgba(' + GOLD + ',0.13)');
  shore.addColorStop(0.85, 'rgba(' + GOLD + ',0.07)');
  shore.addColorStop(1, 'rgba(' + GOLD + ',0)');
  s.fillStyle = shore;
  s.fillRect(0, HZ, W, 1);

  // ── EASTER EGG: him, on the bike, in the clear space just east of the
  //    RenCen. Drawn LAST — every other rank of buildings is painted after the
  //    RenCen, and they were burying him.
  drawRider(s, podR + 60 * S, HZ - roofH, Math.max(1.0, S) * 1.05);
}

/* ═══════════════════════════════════════════════════════════════════════════
   THE RIDER — him, on the bike. Traced from his own reference photo.

   Rendered big and alone by rider-lab.html so the anatomy can be CHECKED
   against the photo rather than guessed at, then dropped into the skyline at a
   few dozen pixels tall.

   PROPORTIONS, measured off the photo and expressed in wheelbase units. This
   is the part that was wrong before — the rider was drawn far too tall against
   the bike, which is what made him look like a man perched on a bicycle:

     wheelbase              16.4 u   (rear wheel -8.0, front wheel +8.4)
     wheel radius            3.2 u   (~0.20 of wheelbase)
     seat height             8.0 u   (~0.49)   he sits LOW in the bike
     tank top               10.2 u   (~0.62)
     helmet top             16.4 u   (~1.00)   total height ~= the wheelbase
     hip                     7.8 u   knee 8.7 u   boot 4.4 u

   The bike is a NAKED streetfighter (Z900), and every difference from a faired
   sportbike matters to the read:
     - no fairing, so the ENGINE is the middle of the silhouette, exposed
     - the rider sits UPRIGHT with a slight forward lean, not in a racing tuck
     - wide flat bars, arms reaching forward and only slightly down
     - upside-down forks, strongly raked, and GOLD: the one flash of colour
     - short tail kicked UP above the seat, ending in a point
   ═══════════════════════════════════════════════════════════════════════════ */
function drawRider(s, gx, gy, k) {
  const GOLD = '201,162,75';
  const GOLD_HI = '232,199,106';
  const CRIMSON = '225,29,72';

  const SIL = '#010204';                      // the silhouette itself
  const EDGE = 'rgba(' + GOLD + ',0.5)';      // rim light: separates, never draws

  s.save();
  s.translate(gx, gy);
  s.lineJoin = 'round';
  s.lineCap = 'round';

  // Headlight throw. A circle, not a rect: a radial gradient painted into a
  // rect is cut off square at the edges and reads as a glowing box.
  const beam = s.createRadialGradient(10 * k, -8 * k, 0, 10 * k, -8 * k, 24 * k);
  beam.addColorStop(0, 'rgba(' + GOLD_HI + ',0.32)');
  beam.addColorStop(0.45, 'rgba(' + GOLD_HI + ',0.08)');
  beam.addColorStop(1, 'rgba(' + GOLD_HI + ',0)');
  s.fillStyle = beam;
  s.beginPath(); s.arc(10 * k, -8 * k, 24 * k, 0, 7); s.fill();

  const P = (pts) => {
    s.beginPath();
    s.moveTo(pts[0][0] * k, pts[0][1] * k);
    for (let i = 1; i < pts.length; i++) s.lineTo(pts[i][0] * k, pts[i][1] * k);
    s.closePath();
  };
  const fillEdge = (pts, edgeA) => {
    s.fillStyle = SIL;
    P(pts);
    s.fill();
    s.strokeStyle = 'rgba(' + GOLD + ',' + (edgeA || 0.45) + ')';
    s.lineWidth = Math.max(0.7, 0.5 * k);
    s.stroke();
  };

  // ── WHEELS. Fat, and a full wheelbase apart.
  s.fillStyle = SIL;
  s.strokeStyle = EDGE;
  s.lineWidth = Math.max(0.8, 0.55 * k);
  s.beginPath(); s.arc(-8 * k, -3.2 * k, 3.2 * k, 0, 7); s.fill(); s.stroke();
  s.beginPath(); s.arc(8.4 * k, -3.2 * k, 3.2 * k, 0, 7); s.fill(); s.stroke();

  // ── SWINGARM, EXHAUST CAN, HEADER PIPE.
  s.strokeStyle = EDGE;
  s.lineWidth = 1.0 * k;
  s.beginPath();
  s.moveTo(-8 * k, -3.2 * k);
  s.lineTo(-2.5 * k, -4.6 * k);
  s.stroke();
  fillEdge([[-4.6, -3.4], [-8.8, -4.6], [-9.0, -3.2], [-4.6, -2.6]], 0.4);   // can
  s.lineWidth = 0.8 * k;                                                      // header
  s.strokeStyle = 'rgba(' + GOLD + ',0.35)';
  s.beginPath();
  s.moveTo(3.0 * k, -4.4 * k);
  s.quadraticCurveTo(-0.5 * k, -1.9 * k, -4.4 * k, -3.0 * k);
  s.stroke();

  // ── ENGINE: on a naked bike this block IS the middle of the silhouette.
  //    Leave it out and the bike reads as hollow, which is exactly what a
  //    bicycle looks like.
  fillEdge([
    [-3.6, -3.4], [-3.4, -7.0], [4.4, -7.2], [4.9, -4.8], [3.4, -3.0], [-1.0, -2.9],
  ], 0.4);

  // ── TANK + SEAT + TAIL, one mass. Tail kicks UP above the seat to a point.
  fillEdge([
    [-9.0, -10.4],   // tail tip, up and back to a point
    [-6.4, -10.0],   // tail top
    [-4.8, -9.4],
    [-3.6, -8.4],    // seat, low: he sits DOWN in the bike
    [-1.2, -8.8],
    [1.2, -10.4],    // tank top: the chunky wedge
    [3.6, -10.2],
    [5.4, -9.0],     // tank shoulder, sloping to the bars
    [5.8, -7.8],
    [3.8, -8.0],     // underside of the tank — stops ABOVE the engine
    [-1.6, -7.9],
    [-3.8, -8.0],
    [-5.6, -8.6],    // under the seat
    [-7.6, -8.8],    // underside of the tail: give it depth, not a rod
  ], 0.5);
  // Frame rails bridging the gap between the tank unit and the engine. Without
  // the gap (and these), the tank, seat and engine fuse into one black slab and
  // the bike stops reading as a naked bike.
  s.strokeStyle = 'rgba(' + GOLD + ',0.5)';
  s.lineWidth = Math.max(0.7, 0.5 * k);
  s.beginPath();
  s.moveTo(-3.4 * k, -8.0 * k);
  s.lineTo(-1.4 * k, -6.6 * k);
  s.moveTo(3.4 * k, -8.0 * k);
  s.lineTo(4.2 * k, -7.2 * k);
  s.moveTo(-4.6 * k, -8.6 * k);
  s.lineTo(-2.4 * k, -4.9 * k);   // rear shock / subframe
  s.stroke();

  // ── FORKS: upside-down, strongly raked, and GOLD.
  s.strokeStyle = 'rgba(' + GOLD_HI + ',0.8)';
  s.lineWidth = 0.55 * k;
  s.beginPath();
  s.moveTo(5.6 * k, -12.2 * k);
  s.lineTo(8.4 * k, -3.2 * k);          // down to the axle
  s.stroke();
  // Wide flat bars.
  s.strokeStyle = 'rgba(' + GOLD + ',0.6)';
  s.lineWidth = 0.5 * k;
  s.beginPath();
  s.moveTo(3.2 * k, -11.7 * k);
  s.lineTo(6.2 * k, -12.3 * k);
  s.stroke();
  // Headlight, small and round, behind the bars.
  s.fillStyle = 'rgba(' + GOLD_HI + ',0.95)';
  s.beginPath(); s.arc(6.6 * k, -11.3 * k, 0.75 * k, 0, 7); s.fill();
  // Front mudguard hugging the wheel.
  s.strokeStyle = EDGE;
  s.lineWidth = 0.9 * k;
  s.beginPath();
  s.arc(8.4 * k, -3.2 * k, 4.2 * k, -2.6, -1.3);
  s.stroke();

  // ── LEG. Drawn before the torso: the thigh disappears behind the hip.
  //    Thigh rises FORWARD from the hip to a high knee, shin drops back to the
  //    peg. Filled, with real thickness — a line here is a stick figure.
  fillEdge([
    [-5.4, -9.6],    // hip, UP off the seat
    [-2.2, -9.4],    // thigh, driven forward
    [-1.2, -8.2],    // knee, up into the tank
    [-2.2, -5.6],    // shin dropping back, in FRONT of the engine
    [-2.4, -4.2],    // boot on the peg
    [-4.4, -4.0],    // toe forward
    [-4.2, -5.4],
    [-4.4, -6.8],    // back up the calf
    [-6.2, -8.6],
  ], 0.55);

  // ── TORSO. UPRIGHT with a slight forward lean, and bulky — he is in a
  //    hoodie. He sits DOWN in the bike, hips barely above the seat.
  fillEdge([
    [-5.6, -9.8],    // hips, UP and back: arse in the air
    [-4.4, -11.6],   // lower back
    [-1.4, -13.2],   // spine raked down-forward, not stacked upright
    [1.6, -13.6],    // shoulders, well forward over the tank
    [2.8, -12.6],
    [1.8, -11.0],    // chest pointing DOWN at the tank
    [-0.8, -9.8],    // hoodie falling forward into the lap
    [-3.4, -9.2],
  ], 0.5);

  // ── ARM: forward, only slightly down, elbow bent, hands on the bars.
  fillEdge([
    [1.2, -13.4],    // shoulder, already forward
    [3.2, -12.8],    // elbow, tucked in
    [5.0, -12.2],    // forearm to the bar
    [5.6, -11.6],    // hand on the grip
    [4.6, -11.2],
    [2.8, -11.6],    // underside back to the chest
    [1.0, -12.2],
  ], 0.5);

  // ── HELMET: full-face, chin bar jutting forward. Total height lands at about
  //    one wheelbase, which is what the photo says.
  s.fillStyle = SIL;
  s.beginPath();
  s.arc(2.6 * k, -14.4 * k, 1.95 * k, 0, 7);
  s.fill();
  s.strokeStyle = EDGE;
  s.lineWidth = Math.max(0.7, 0.55 * k);
  s.stroke();
  fillEdge([[3.4, -15.2], [5.2, -14.2], [5.0, -12.9], [3.2, -13.1]], 0.5);   // chin bar, over the bars
  s.fillStyle = 'rgba(' + GOLD_HI + ',0.4)';                                  // visor
  P([[3.5, -15.0], [5.0, -14.1], [4.9, -13.3], [3.4, -13.5]]);
  s.fill();

  // ── Tail light.
  s.fillStyle = 'rgba(' + CRIMSON + ',0.95)';
  s.beginPath(); s.arc(-8.4 * k, -10.4 * k, 0.85 * k, 0, 7); s.fill();

  s.restore();
}

const c = document.getElementById('c'), x = c.getContext('2d');
const kEl = document.getElementById('k'), kv = document.getElementById('kv');
function render() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = c.clientWidth, h = c.clientHeight;
  c.width = w * dpr; c.height = h * dpr;
  x.setTransform(dpr, 0, 0, dpr, 0, 0);
  x.fillStyle = '#0a0e1c'; x.fillRect(0, 0, w, h);
  const k = parseFloat(kEl.value); kv.textContent = k;
  const gy = h * 0.7;
  x.fillStyle = '#05070e'; x.fillRect(0, gy, w, h - gy);          // the roof
  x.fillStyle = 'rgba(201,162,75,0.25)'; x.fillRect(0, gy, w, 1);
  drawRider(x, w * 0.5, gy, k);
}
kEl.addEventListener('input', render);
window.addEventListener('resize', render);
render();
</script>
</body></html>
