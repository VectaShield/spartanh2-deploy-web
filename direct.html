<body>
    <main class="card">
        <a href="index.html" class="back-link" aria-label="Back to home">← Back</a>

        <h1 class="name">DIRECT<span class="accent"> SUPPORT</span></h1>
        <p class="tagline">Fuel the ride</p>

        <section class="links">
            <h2 class="section-title">Crypto Wallets</h2>

            <div id="wallets"></div>

            <p class="fine-print">Always verify the network before sending. Coins sent to the wrong network (for example DOGE to a BTC address) will be permanently lost.</p>
        </section>

        <footer class="footer">
            <a href="index.html">← SpartanH2 Home</a>
            <span>© <span id="year"></span> SpartanH2</span>
        </footer>
    </main>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  WALLET CONFIG : single source of truth. Edit here, only here.
        //  To add a coin: append an object. To change an address: edit `address`.
        // ═══════════════════════════════════════════════════════════════
        const WALLETS = [
            {
                symbol: 'BTC',
                name: 'Bitcoin',
                mark: '₿',
                network: 'BTC · Bitcoin network',
                address: 'bc1q8czhpnymkc8xj4afa3nalrfsfmer74wk6tfmh5',
            },
            {
                symbol: 'XMR',
                name: 'Monero',
                mark: 'ɱ',
                network: 'XMR · Private & untraceable',
                address: '43xiTDi62zH4sNCfHCYQ3KMQtGEN6nKubeGPEh4VixyQN9fQ2jroKsNSVoH4k9evoj5g3dUoxqtT4KPeQ9iHs5daQSENPeM',
            },
            {
                symbol: 'DOGE',
                name: 'Dogecoin',
                mark: 'Ð',
                network: 'DOGE · Dogecoin network',
                address: 'D5S3JcyQdEuCwsHt98AWUr1VWdfDqYJnCi',
            },
        ];
        // ═══════════════════════════════════════════════════════════════

        document.getElementById('year').textContent = new Date().getFullYear();

        function renderWallets() {
            const container = document.getElementById('wallets');
            container.innerHTML = WALLETS.map(w => {
                const cls = w.symbol.toLowerCase();
                return `
                    <article class="crypto-card" data-symbol="${w.symbol}">
                        <header class="crypto-head">
                            <span class="crypto-mark ${cls}" aria-hidden="true">${w.mark}</span>
                            <div class="crypto-meta">
                                <h3>${w.name}</h3>
                                <span class="crypto-net">${w.network}</span>
                            </div>
                        </header>
                        <div class="addr-row">
                            <code class="addr" data-address="${w.address}">${w.address}</code>
                            <button type="button" class="copy-btn" aria-label="Copy ${w.name} address">Copy</button>
                        </div>
                        <a class="qr-link" href="#" aria-label="Show ${w.name} QR code">Show QR</a>
                        <div class="qr-slot" hidden></div>
                    </article>
                `;
            }).join('');
        }

        function wireCard(card) {
            const addr = card.querySelector('.addr').dataset.address;
            const copyBtn = card.querySelector('.copy-btn');
            const qrLink = card.querySelector('.qr-link');
            const slot = card.querySelector('.qr-slot');

            copyBtn.addEventListener('click', async () => {
                const orig = copyBtn.textContent;
                const flash = (label, ok = true) => {
                    copyBtn.textContent = label;
                    if (ok) copyBtn.classList.add('copied');
                    setTimeout(() => { copyBtn.textContent = orig; copyBtn.classList.remove('copied'); }, 1600);
                };
                try {
                    await navigator.clipboard.writeText(addr);
                    flash('Copied!');
                } catch (e) {
                    // Clipboard API failed (insecure context or permission) : try execCommand fallback
                    try {
                        const ta = document.createElement('textarea');
                        ta.value = addr;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        const ok = document.execCommand('copy');
                        document.body.removeChild(ta);
                        flash(ok ? 'Copied!' : 'Press Ctrl+C', ok);
                    } catch (_) {
                        // Last resort: select the address so the user can Ctrl+C manually
                        const range = document.createRange();
                        range.selectNode(card.querySelector('.addr'));
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                        flash('Press Ctrl+C', false);
                    }
                }
            });

            qrLink.addEventListener('click', (e) => {
                e.preventDefault();
                if (slot.hasAttribute('hidden')) {
                    slot.innerHTML = '';
                    new QRCode(slot, {
                        text: addr,
                        width: 200,
                        height: 200,
                        colorDark: '#e8c76a',
                        colorLight: '#0a1020',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    slot.removeAttribute('hidden');
                    qrLink.textContent = 'Hide QR';
                } else {
                    slot.setAttribute('hidden', '');
                    slot.innerHTML = '';
                    qrLink.textContent = 'Show QR';
                }
            });
        }

        renderWallets();
        document.querySelectorAll('.crypto-card').forEach(wireCard);
    </script>
</body>
</html>
