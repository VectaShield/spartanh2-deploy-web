<body>
    <main class="card card-wide">
        <a href="index.html" class="back-link" aria-label="Back to home">← Back</a>

        <h1 class="name name-solid">PARTNERS</h1>
        <p class="tagline">Who we ride with</p>

        <section class="links">
            <div id="partners-grid" class="partners-grid"></div>
            <p class="fine-print">Interested in partnering? <a href="contact.html">Reach out here</a>.</p>
        </section>

        <footer class="footer">
            <a href="index.html">← SpartanH2 Home</a>
            <span>© <span id="year"></span> SpartanH2</span>
        </footer>
    </main>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  PARTNERS CONFIG : single source of truth. Edit here, only here.
        //  Fields per entry (all optional except name):
        //    name          : display name (required)
        //    brandColor    : hex used for the name text + top accent stripe
        //    avatar        : image path/URL, OR omit to use SVG initials fallback
        //    tagline       : short one-liner
        //    since         : year they became a partner (number or string)
        //    region        : 2-letter ISO country code ('US', 'JP', 'GB'). Renders as an inline SVG flag if present in the FLAGS map below, falls back to a small text badge otherwise. Omit to hide.
        //    bike          : motorcycle model as a string (e.g. 'Z H2', 'Panigale V2'). Renders as a small badge after the flag.
        //    disciplines   : array: e.g. ['Street','Track']
        //    categories    : array: e.g. ['Creator'] or ['Brand','Apparel']
        //    socials       : array of {label, url, iconId} : iconId is a key from icons.svg (e.g. 'youtube', 'instagram', 'tiktok', 'facebook')
        //    cta           : { label, url } primary call-to-action button, or omit
        //    kind          : 'creator' | 'brand' (for future filtering; unused visually)
        // ═══════════════════════════════════════════════════════════════
        const PARTNERS = [
            {
                name: 'zh.who',
                brandColor: '#c9a24b', // placeholder : confirm real brand color (photo has red + teal hoodie print)
                avatar: 'zh-who.jpg?v=2',
                tagline: 'Detroit biketok, street & strip.',
                since: 2024,
                region: 'US',
                bike: 'Z H2',
                disciplines: ['Street', 'Drag'],
                categories: ['Creator'],
                socials: [
                    { label: 'TikTok',    url: 'https://www.tiktok.com/@zh.who',      iconId: 'tiktok' },
                    { label: 'Instagram', url: 'https://www.instagram.com/zh.who/',   iconId: 'instagram' },
                ],
                cta: { label: 'Follow', url: 'https://www.tiktok.com/@zh.who' },
                kind: 'creator',
            },
        ];
        // ═══════════════════════════════════════════════════════════════

        document.getElementById('year').textContent = new Date().getFullYear();

        // Build an SVG "initials on brand color" avatar as a data URI : no external calls.
        function initialsAvatar(name, color) {
            const initials = name
                .split(/[\s.]+/)
                .filter(Boolean)
                .map(w => w[0])
                .slice(0, 2)
                .join('')
                .toUpperCase();
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
                    <defs>
                        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="${color}"/>
                            <stop offset="1" stop-color="#0a1020"/>
                        </linearGradient>
                    </defs>
                    <rect width="220" height="220" fill="url(#g)"/>
                    <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
                          font-family="Cinzel, serif" font-weight="800" font-size="96"
                          fill="#f4e4b8" letter-spacing="4">${initials}</text>
                </svg>`;
            return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
        }

        // Escape HTML : turns user-content into safe text for innerHTML interpolation
        const esc = (s) => String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        // Validate URLs : only http(s), mailto, or same-page fragment allowed in href
        const safeUrl = (u) => {
            const s = String(u ?? '');
            return /^(https?:|mailto:|#|\/|\.\/|\.\.\/|[a-z0-9_\-.]+\.html)/i.test(s) ? s : '#';
        };
        // Validate brand color : only 3/6/8-digit hex allowed in inline style
        const safeColor = (c) => /^#[0-9a-f]{3,8}$/i.test(String(c ?? '')) ? c : '#e8c76a';

        // Country flags as inline SVG. Data URI so each <img> instance is
        // fully self contained and marker IDs cannot collide across cards.
        // Source: flag-icons library (github.com/lipis/flag-icons, MIT).
        // Add new countries here as partners appear.
        const FLAGS = {
            US: {
                name: 'United States',
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480"><path fill="#bd3d44" d="M0 0h640v480H0"/><path stroke="#fff" stroke-width="37" d="M0 55.3h640M0 129h640M0 203h640M0 277h640M0 351h640M0 425h640"/><path fill="#192f5d" d="M0 0h364.8v258.5H0"/><marker id="a" markerHeight="30" markerWidth="30"><path fill="#fff" d="m14 0 9 27L0 10h28L5 27z"/></marker><path fill="none" marker-mid="url(#a)" d="m0 0 16 11h61 61 61 61 60L47 37h61 61 60 61L16 63h61 61 61 61 60L47 89h61 61 60 61L16 115h61 61 61 61 60L47 141h61 61 60 61L16 166h61 61 61 61 60L47 192h61 61 60 61L16 218h61 61 61 61 60z"/></svg>`,
            },
        };
        const flagDataUri = (code) => {
            const f = FLAGS[code];
            return f ? 'data:image/svg+xml,' + encodeURIComponent(f.svg) : null;
        };

        function renderPartners() {
            const container = document.getElementById('partners-grid');
            container.innerHTML = PARTNERS.map(p => {
                const color = safeColor(p.brandColor);
                const avatar = p.avatar ? esc(p.avatar) : initialsAvatar(p.name || '?', color);

                const disciplineChips = (p.disciplines || []).map(d =>
                    `<span class="chip chip-discipline">${esc(d)}</span>`
                ).join('');
                const categoryChips = (p.categories || []).map(c =>
                    `<span class="chip chip-category">${esc(c)}</span>`
                ).join('');
                const chipsRow = (disciplineChips || categoryChips)
                    ? `<div class="partner-chips">${categoryChips}${disciplineChips}</div>`
                    : '';

                const buttons = (p.socials || []).map(s => {
                    const iconMarkup = s.iconId
                        ? `<svg class="icon-svg partner-btn-icon" aria-hidden="true"><use href="icons.svg#i-${esc(s.iconId)}"/></svg>`
                        : '';
                    return `<a class="partner-btn" href="${esc(safeUrl(s.url))}" target="_blank" rel="noopener" style="--brand:${color};" aria-label="${esc(p.name)} on ${esc(s.label)}">${iconMarkup}<span>${esc(s.label)}</span></a>`;
                }).join('');
                const buttonsBlock = buttons ? `<div class="partner-buttons">${buttons}</div>` : '';

                const cta = p.cta
                    ? `<a class="partner-cta" href="${esc(safeUrl(p.cta.url))}" target="_blank" rel="noopener" style="--brand:${color};" aria-label="${esc(p.cta.label)} on ${esc(p.name)}">${esc(p.cta.label)} →</a>`
                    : '';

                const sinceBadge = p.since ? `<span class="partner-since">Since ${esc(p.since)}</span>` : '';
                const bikeBadge = p.bike ? `<span class="partner-bike">${esc(p.bike)}</span>` : '';
                let regionMarkup = '';
                if (p.region) {
                    const uri = flagDataUri(p.region);
                    if (uri) {
                        const flagName = FLAGS[p.region].name;
                        regionMarkup = `<span class="partner-flag-wrap" title="${esc(flagName)}"><img class="partner-flag" src="${uri}" alt="${esc(flagName)}" width="18" height="13"></span>`;
                    } else {
                        regionMarkup = `<span class="partner-region">${esc(p.region)}</span>`;
                    }
                }
                const metaLine = (regionMarkup || bikeBadge || sinceBadge)
                    ? `<div class="partner-meta">${regionMarkup}${bikeBadge}${sinceBadge}</div>`
                    : '';

                return `
                    <article class="partner-poster" style="--brand:${color};">
                        <div class="partner-glow" aria-hidden="true"></div>
                        <div class="partner-avatar-ring">
                            <img class="partner-avatar" src="${avatar}" alt="${esc(p.name)}" loading="lazy">
                        </div>
                        <h3 class="partner-name" style="color:${color};">${esc(p.name)}</h3>
                        ${metaLine}
                        <p class="partner-tagline">${esc(p.tagline || '')}</p>
                        ${chipsRow}
                        ${buttonsBlock}
                        ${cta}
                    </article>
                `;
            }).join('');
        }

        renderPartners();
    </script>
</body>
</html>
